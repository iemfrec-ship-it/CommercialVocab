:root{
  --bg: #FAF5EA;
  --bg-alt: #F3ECDC;
  --ink: #1C2B30;
  --ink-soft: #4A5A5F;
  --primary: #0F5E56;
  --primary-dark: #0A403A;
  --primary-light: #E4F0EC;
  --accent: #FF6F4F;
  --accent-dark: #E0512F;
  --gold: #F5B429;
  --gold-dark: #C98E12;
  --success: #2E9E64;
  --success-light: #E4F5EB;
  --danger: #D64545;
  --danger-light: #FBEAEA;
  --card: #FFFFFF;
  --border: #E7DDC8;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 9px;
  --shadow: 0 2px 0 rgba(28,43,48,0.06), 0 12px 28px -14px rgba(28,43,48,0.28);
  --shadow-sm: 0 1px 0 rgba(28,43,48,0.06), 0 4px 12px -6px rgba(28,43,48,0.22);
  --font-display: "Space Grotesk", "Segoe UI", sans-serif;
  --font-body: "Inter", "Segoe UI", sans-serif;
}

*,*::before,*::after{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  font-family:var(--font-body);
  background:
    radial-gradient(circle at 6% 2%, rgba(15,94,86,0.14), transparent 42%),
    radial-gradient(circle at 98% 10%, rgba(255,111,79,0.16), transparent 40%),
    radial-gradient(circle at 20% 96%, rgba(245,180,41,0.14), transparent 38%),
    radial-gradient(circle at 85% 90%, rgba(46,158,100,0.10), transparent 36%),
    var(--bg);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{ font-family:var(--font-display); font-weight:700; margin:0 0 .4em; letter-spacing:-0.01em; }
p{ margin:0 0 .8em; line-height:1.55; }
button{ font-family:var(--font-body); }
:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; border-radius:6px; }

/* ---------- Layout shell ---------- */
.app-shell{ max-width:820px; margin:0 auto; padding:20px 18px 100px; width:100%; flex:1; }
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  margin-bottom:22px;
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-badge{
  width:40px; height:40px; border-radius:12px;
  background:linear-gradient(135deg, var(--primary), var(--primary-dark));
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:17px;
  box-shadow: var(--shadow-sm);
  transform:rotate(-4deg);
}
.spin-badge{ animation:wiggle 4.5s ease-in-out infinite; }
@keyframes wiggle{
  0%,100%{ transform:rotate(-4deg); }
  50%{ transform:rotate(4deg) scale(1.05); }
}
.brand-name{ font-family:var(--font-display); font-weight:700; font-size:1.05rem; color:var(--primary-dark); }
.brand-sub{ font-size:.72rem; color:var(--ink-soft); margin-top:-2px; }
.score-chip{
  display:flex; align-items:center; gap:7px;
  background:var(--card); border:1px solid var(--border); border-radius:999px;
  padding:7px 14px 7px 8px; box-shadow:var(--shadow-sm);
  font-family:var(--font-display); font-weight:700; font-size:.95rem; color:var(--primary-dark);
}
.score-chip .dot{
  width:26px; height:26px; border-radius:50%;
  background:var(--gold); color:#4A3300;
  display:flex; align-items:center; justify-content:center; font-size:.85rem;
  animation:starPulse 2.4s ease-in-out infinite;
}
@keyframes starPulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.15) rotate(8deg); } }

/* ---------- Pipeline stepper (signature element) ---------- */
.pipeline{
  display:flex; align-items:center; gap:2px;
  margin:0 0 26px; padding:14px 12px; background:var(--card);
  border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
  overflow-x:auto;
}
.pipeline-stop{
  display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; min-width:38px;
  position:relative;
}
.pipeline-stop .num{
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:1rem;
  background:var(--bg-alt); color:var(--ink-soft); border:2px solid var(--border);
  transition:all .25s ease;
}
.pipeline-stop.done .num{ background:var(--success); border-color:var(--success); color:#fff; }
.pipeline-stop.current .num{
  background:linear-gradient(135deg, var(--accent), var(--accent-dark));
  border-color:var(--accent-dark); color:#fff;
  animation:pulseGlow 1.8s ease-in-out infinite;
}
@keyframes pulseGlow{
  0%,100%{ box-shadow:0 0 0 4px rgba(255,111,79,0.22); }
  50%{ box-shadow:0 0 0 8px rgba(255,111,79,0.10); }
}
.pipeline-stop .lbl{ font-size:.62rem; color:var(--ink-soft); text-align:center; line-height:1.1; font-weight:600; }
.pipeline-stop.current .lbl{ color:var(--accent-dark); font-weight:700; }
.pipeline-line{ flex:0 0 auto; width:100%; height:2px; background:var(--border); margin-top:-19px; z-index:-1; }

/* ---------- Cards ---------- */
.card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg);
  box-shadow:var(--shadow); padding:28px 26px;
  animation:fadeUp .35s ease both;
  position:relative; overflow:hidden;
}
@keyframes fadeUp{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
.card + .card{ margin-top:16px; }
.eyebrow{
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--font-display); font-weight:700; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase;
  color:var(--primary); background:var(--primary-light); padding:5px 11px; border-radius:999px; margin-bottom:14px;
}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--font-display); font-weight:700; font-size:.95rem;
  padding:13px 22px; border-radius:12px; border:none; cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  box-shadow:var(--shadow-sm);
}
.btn:active{ transform:translateY(1px); }
.btn-primary{ background:linear-gradient(135deg, var(--accent), var(--accent-dark)); color:#fff; }
.btn-primary:hover{ filter:brightness(1.04); }
.btn-primary:disabled{ background:var(--border); color:var(--ink-soft); cursor:not-allowed; box-shadow:none; }
.btn-secondary{ background:var(--card); color:var(--primary-dark); border:2px solid var(--primary); }
.btn-secondary:hover{ background:var(--primary-light); }
.btn-ghost{ background:transparent; color:var(--ink-soft); box-shadow:none; padding:8px 10px; font-size:.82rem; text-decoration:underline; }
.btn-block{ width:100%; }
.btn-row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:22px; }

/* ---------- Forms ---------- */
.field{ margin-bottom:16px; }
.field label{ display:block; font-weight:600; font-size:.85rem; margin-bottom:6px; color:var(--ink); }
.field input{
  width:100%; padding:12px 14px; border-radius:10px; border:2px solid var(--border);
  font-size:1rem; font-family:var(--font-body); background:var(--bg-alt); color:var(--ink);
}
.field input:focus{ border-color:var(--primary); outline:none; background:#fff; }
.id-preview{
  margin-top:8px; font-family:var(--font-display); font-weight:700; color:var(--primary-dark);
  background:var(--primary-light); display:inline-block; padding:6px 14px; border-radius:999px; font-size:1.1rem; letter-spacing:.03em;
  animation:popIn .3s ease both;
}
.two-col{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.upper-input{ text-transform:uppercase; font-family:var(--font-display); font-weight:700; letter-spacing:.08em; text-align:center; font-size:1.2rem !important; }
.hero-card{ position:relative; overflow:hidden; }
.confetti-deco{
  position:absolute; top:8px; right:10px; font-size:1.3rem; opacity:.5; letter-spacing:6px;
  transform:rotate(6deg);
}
.level-icon-badge{
  display:inline-flex; align-items:center; justify-content:center;
  width:56px; height:56px; border-radius:16px; font-size:1.8rem;
  background:linear-gradient(135deg, var(--primary-light), #fff);
  border:2px solid var(--primary-light); margin-bottom:10px;
  animation:popIn .4s ease both;
}
.btn-lg{ padding:16px 26px; font-size:1.05rem; }
.btn-lg:hover{ transform:translateY(-2px) scale(1.015); }

/* ---------- Question / options ---------- */
.q-progress{ font-size:.8rem; color:var(--ink-soft); font-weight:600; margin-bottom:10px; }
.q-text{ font-size:1.15rem; font-weight:600; margin-bottom:20px; line-height:1.45; }
.options{ display:flex; flex-direction:column; gap:10px; }
.option{
  display:flex; align-items:center; gap:12px;
  text-align:left; padding:14px 16px; border-radius:12px; border:2px solid var(--border);
  background:var(--bg-alt); cursor:pointer; font-size:.98rem; color:var(--ink);
  transition:border-color .15s, background .15s;
}
.option .letter{
  flex:0 0 auto; width:26px; height:26px; border-radius:50%; background:#fff; border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:.78rem; color:var(--ink-soft);
}
.option:hover{ border-color:var(--primary); transform:translateY(-1px); box-shadow:var(--shadow-sm); }
.option.selected{ border-color:var(--accent); background:#FFF1EC; }
.option.selected .letter{ background:var(--accent); border-color:var(--accent-dark); color:#fff; }
.tf-row{ display:flex; gap:12px; }
.tf-row .option{ flex:1; justify-content:center; text-align:center; font-weight:700; font-family:var(--font-display); }

/* ---------- Reading (level 5) ---------- */
.reading-wrap{ display:grid; grid-template-columns:1fr; gap:16px; }
@media(min-width:760px){ .reading-wrap{ grid-template-columns: 1.05fr 1fr; align-items:start; } }
.reading-text{
  background:var(--bg-alt); border:1px solid var(--border); border-radius:var(--radius-md);
  padding:20px; font-size:.95rem; line-height:1.65; max-height:60vh; overflow-y:auto;
  position:sticky; top:16px;
}
.reading-text h4{ color:var(--primary-dark); }

/* ---------- Reorder (level 6) ---------- */
.reorder-list{ display:flex; flex-direction:column; gap:8px; }
.reorder-item{
  display:flex; align-items:center; gap:12px; background:var(--bg-alt); border:2px solid var(--border);
  border-radius:12px; padding:11px 12px;
}
.reorder-item .speaker{
  flex:0 0 auto; font-family:var(--font-display); font-weight:700; font-size:.68rem; text-transform:uppercase;
  padding:4px 8px; border-radius:8px; letter-spacing:.03em;
}
.reorder-item.speaker-Salesperson .speaker{ background:var(--primary-light); color:var(--primary-dark); }
.reorder-item.speaker-Customer .speaker{ background:#FDEFE9; color:var(--accent-dark); }
.reorder-item .txt{ flex:1; font-size:.9rem; }
.reorder-item .moves{ display:flex; flex-direction:column; gap:3px; }
.reorder-item .moves button{
  border:1px solid var(--border); background:#fff; border-radius:6px; width:26px; height:22px; cursor:pointer; font-size:.75rem;
  color:var(--ink-soft);
}
.reorder-item .moves button:hover{ background:var(--primary-light); color:var(--primary-dark); }
.reorder-item .moves button:disabled{ opacity:.3; cursor:default; }

/* ---------- Result screen ---------- */
.result-hero{ text-align:center; padding:8px 0 6px; }
.result-pct{ font-family:var(--font-display); font-weight:700; font-size:3rem; color:var(--primary-dark); }
.result-msg{ font-size:1.05rem; font-weight:600; margin-top:4px; }
.result-badges{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:18px 0 6px; }
.badge{
  display:flex; align-items:center; gap:7px; padding:9px 15px; border-radius:12px; font-weight:700; font-size:.9rem;
  font-family:var(--font-display);
}
.badge.pos{ background:var(--success-light); color:var(--success); }
.badge.neg{ background:var(--danger-light); color:var(--danger); }
.badge.neutral{ background:var(--bg-alt); color:var(--ink-soft); }
.pop-in{ animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both; }
.big-pop{ animation:bigPop .5s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes popIn{ from{ opacity:0; transform:scale(.7) translateY(6px); } to{ opacity:1; transform:scale(1) translateY(0); } }
@keyframes bigPop{ 0%{ opacity:0; transform:scale(.5); } 70%{ transform:scale(1.08); } 100%{ opacity:1; transform:scale(1); } }

.stars{ display:flex; gap:4px; justify-content:center; margin:8px 0; font-size:1.6rem; }
.star{ filter:grayscale(1); opacity:.35; transition:all .2s; }
.star.on{ filter:none; opacity:1; animation:starPop .4s ease both; }
.star.on:nth-child(2){ animation-delay:.1s; }
.star.on:nth-child(3){ animation-delay:.2s; }
@keyframes starPop{ 0%{ transform:scale(0) rotate(-20deg); } 70%{ transform:scale(1.2) rotate(8deg); } 100%{ transform:scale(1) rotate(0); } }

.rank-title{
  font-family:var(--font-display); font-weight:700; font-size:1.1rem; color:var(--accent-dark);
  background:#FFF1EC; display:inline-block; padding:7px 16px; border-radius:999px; margin-bottom:10px;
  animation:popIn .4s ease both;
}

/* ---------- Confetti ---------- */
.confetti-canvas{ position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.confetti-piece{
  position:absolute; top:-10px; width:8px; height:14px; opacity:.9; border-radius:2px;
  animation-name:confettiFall; animation-timing-function:ease-in; animation-fill-mode:forwards;
}
@keyframes confettiFall{
  to{ transform:translateY(420px) rotate(540deg); opacity:0; }
}
.level-intro-card, .result-hero{ position:relative; }

/* ---------- Level intro ---------- */
.objectif-box{
  background:var(--primary-light); border-left:4px solid var(--primary); border-radius:10px;
  padding:14px 16px; margin:14px 0; font-size:.92rem;
}
.consigne-box{
  background:var(--bg-alt); border-left:4px solid var(--gold-dark); border-radius:10px;
  padding:14px 16px; margin:0 0 14px; font-size:.92rem;
}

/* ---------- Footer ---------- */
.site-footer{
  margin-top:auto; padding:22px 18px 26px; text-align:center; font-size:.78rem; color:var(--ink-soft);
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.site-footer .links{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.site-footer a, .link-btn{
  background:none; border:none; color:var(--primary); text-decoration:underline; cursor:pointer; font-size:.78rem; font-family:var(--font-body); padding:0;
}
.floating-pdf{
  position:fixed; right:18px; bottom:18px; z-index:40;
  box-shadow:0 8px 22px -6px rgba(28,43,48,0.35);
}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(28,43,48,0.55); display:flex; align-items:center; justify-content:center;
  padding:20px; z-index:100;
}
.modal-box{
  background:#fff; border-radius:var(--radius-lg); max-width:560px; width:100%; max-height:82vh; overflow-y:auto;
  padding:26px; box-shadow:var(--shadow);
}
.modal-box pre{ white-space:pre-wrap; font-family:var(--font-body); font-size:.88rem; line-height:1.6; color:var(--ink); }

/* ---------- Utility ---------- */
.muted{ color:var(--ink-soft); font-size:.88rem; }
.center{ text-align:center; }
.mt-8{ margin-top:8px;} .mt-16{margin-top:16px;} .mt-24{margin-top:24px;}
.summary-table{ width:100%; border-collapse:collapse; font-size:.85rem; margin-top:10px; }
.summary-table th, .summary-table td{ text-align:left; padding:8px 6px; border-bottom:1px solid var(--border); }
.summary-table th{ font-family:var(--font-display); color:var(--ink-soft); font-size:.72rem; text-transform:uppercase; letter-spacing:.03em; }

</style>
</head>

  <script>
/* ===================== SALES ENGLISH CHALLENGE — APP LOGIC ===================== */
/* Créé par C. Iemfre */

const STORAGE_KEY = "sec_ndrc_state_v1";
const PIPELINE_LABELS = ["Vocab.","V/Faux","Contexte","Objections","Lecture","Ordre","Réplique"];
const LEVEL_ICONS = ["📘","✅","✍️","🤝","📖","🔀","💬"];
const RANK_TITLES = [
  {min: 250, label:"🏆 Négociateur Expert"},
  {min: 150, label:"🥈 Excellent Vendeur"},
  {min: 60,  label:"🥉 Bon Vendeur"},
  {min: -9999, label:"💪 Vendeur en progression"}
];
function getRankTitle(score){
  return (RANK_TITLES.find(r => score >= r.min) || RANK_TITLES[RANK_TITLES.length-1]).label;
}
function starsForPct(pct){
  if(pct === 100) return 3;
  if(pct >= 85) return 2;
  if(pct >= 60) return 1;
  return 0;
}
function starsHtml(n){
  let out = "";
  for(let i=0;i<3;i++) out += `<span class="star ${i<n?'on':''}">${i<n?'⭐':'☆'}</span>`;
  return `<div class="stars">${out}</div>`;
}

let state = null;
let runner = null; // {levelIdx, variantIdx, items, kind, answers:[], text, reorderOrder, currentIndex}

/* ---------- Persistence ---------- */
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

/* ---------- Helpers ---------- */
function stripDiacritics(str){
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function sanitizeInitials(val){
  return stripDiacritics(val).replace(/[^a-zA-Z]/g,"").toUpperCase().slice(0,2);
}
function computeStudentId(first,last){
  const f = sanitizeInitials(first);
  const l = sanitizeInitials(last);
  if(f.length<2 || l.length<2) return null;
  return f+"-"+l;
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR')+" "+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

/* ---------- Init ---------- */
function initApp(){
  state = loadState();
  if(state && typeof state.totalScore === "number"){ lastDisplayedScore = state.totalScore; }
  render();
}

/* ---------- Screen router ---------- */
function render(){
  const app = document.getElementById("app");
  if(!state){
    app.innerHTML = renderIdentificationScreen();
    attachIdentificationEvents();
    renderFooter();
    return;
  }
  if(state.screen === "teacher"){
    app.innerHTML = renderTeacherScreen();
    renderFooter();
    return;
  }
  if(state.screen === "final"){
    app.innerHTML = renderTopbar() + renderPipeline() + renderFinalScreen();
    attachFinalEvents();
    renderFooter();
    animateScoreDisplay();
    return;
  }
  if(state.screen === "result"){
    app.innerHTML = renderTopbar() + renderPipeline() + renderResultScreen();
    attachResultEvents();
    renderFooter();
    animateScoreDisplay();
    return;
  }
  if(state.screen === "exercise"){
    if(!runner){
      // La progression de l'exercice en cours n'est pas persistée (rechargement de page, etc.)
      // On repart proprement sur l'écran d'introduction du niveau/exercice en cours.
      state.screen = "levelIntro";
      saveState();
      return render();
    }
    app.innerHTML = renderTopbar() + renderPipeline() + renderExerciseScreen();
    attachExerciseEvents();
    renderFooter();
    return;
  }
  // default: level intro
  app.innerHTML = renderTopbar() + renderPipeline() + renderLevelIntroScreen();
  attachLevelIntroEvents();
  renderFooter();
  animateScoreDisplay();
}

/* ---------- Topbar & pipeline ---------- */
let lastDisplayedScore = 0;
function renderTopbar(){
  return `
  <div class="topbar">
    <div class="brand">
      <div class="brand-badge spin-badge">SE</div>
      <div>
        <div class="brand-name">Sales English Challenge</div>
        <div class="brand-sub">🪪 ${escapeHtml(state.studentId)}</div>
      </div>
    </div>
    <div class="score-chip"><span class="dot">★</span> <span id="scoreValue">${lastDisplayedScore}</span> pts</div>
  </div>`;
}
function animateScoreDisplay(){
  const el = document.getElementById("scoreValue");
  if(!el) return;
  const from = lastDisplayedScore;
  const to = state.totalScore;
  if(from === to) return;
  const duration = 550;
  const start = performance.now();
  function step(now){
    const p = Math.min(1, (now-start)/duration);
    const eased = 1 - Math.pow(1-p, 3);
    const val = Math.round(from + (to-from)*eased);
    if(el) el.textContent = val;
    if(p < 1) requestAnimationFrame(step);
    else lastDisplayedScore = to;
  }
  requestAnimationFrame(step);
}
function renderPipeline(){
  let stops = "";
  for(let i=0;i<7;i++){
    const lvlNum = i+1;
    let cls = "pipeline-stop";
    if(lvlNum < state.currentLevel) cls += " done";
    else if(lvlNum === state.currentLevel) cls += " current";
    const icon = lvlNum < state.currentLevel ? "✓" : LEVEL_ICONS[i];
    stops += `<div class="${cls}"><div class="num">${icon}</div><div class="pipeline-line"></div><div class="lbl">${PIPELINE_LABELS[i]}</div></div>`;
  }
  return `<div class="pipeline">${stops}</div>`;
}

/* ---------- Footer ---------- */
function renderFooter(){
  const el = document.getElementById("footer");
  el.innerHTML = `
    <div>Créé par C. Iemfre</div>
    <div class="links">
      <button class="link-btn" onclick="openRGPD()">Confidentialité (RGPD)</button>
      <button class="link-btn" onclick="openTeacherPrompt()">Espace enseignant</button>
    </div>`;
  // floating PDF button visible once identified and not on id screen
  const floatWrap = document.getElementById("floating-pdf-wrap");
  if(state){
    floatWrap.innerHTML = `<button class="btn btn-primary floating-pdf" onclick="downloadPdf()">📄 Télécharger mon PDF</button>`;
  } else {
    floatWrap.innerHTML = "";
  }
}

/* ---------- Identification screen ---------- */
function renderIdentificationScreen(){
  return `
  <div class="topbar">
    <div class="brand">
      <div class="brand-badge spin-badge">SE</div>
      <div>
        <div class="brand-name">Sales English Challenge</div>
        <div class="brand-sub">🚀 Escape game — Anglais commercial</div>
      </div>
    </div>
  </div>
  <div class="card hero-card">
    <div class="confetti-deco" aria-hidden="true">🎯 🏆 💼 📈 🤝</div>
    <span class="eyebrow">Avant de commencer</span>
    <h2>Règles du jeu</h2>
    <p style="white-space:pre-line">${escapeHtml(GAME_RULES_TEXT)}</p>
  </div>
  <div class="card mt-16">
    <span class="eyebrow">🔑 Accès</span>
    <h2>C'est parti !</h2>
    <div class="field">
      <label for="accessCode">Code d'accès (donné par votre professeur)</label>
      <input type="text" id="accessCode" autocomplete="off" placeholder="Code d'accès" maxlength="12">
    </div>
    <div class="two-col">
      <div class="field">
        <label for="firstInit">2 premières lettres du prénom</label>
        <input type="text" id="firstInit" autocomplete="off" placeholder="AA" maxlength="2" class="upper-input">
      </div>
      <div class="field">
        <label for="lastInit">2 premières lettres du nom</label>
        <input type="text" id="lastInit" autocomplete="off" placeholder="AA" maxlength="2" class="upper-input">
      </div>
    </div>
    <div id="idPreviewWrap"></div>
    <div class="btn-row">
      <button class="btn btn-primary btn-block btn-lg" id="startBtn" disabled>🎮 Commencer l'escape game</button>
    </div>
    <p class="muted mt-16" id="idError" style="display:none;color:#D64545;"></p>
  </div>`;
}
function attachIdentificationEvents(){
  const access = document.getElementById("accessCode");
  const first = document.getElementById("firstInit");
  const last = document.getElementById("lastInit");
  const preview = document.getElementById("idPreviewWrap");
  const startBtn = document.getElementById("startBtn");
  const idError = document.getElementById("idError");

  function sanitizeField(input){
    const before = input.value;
    const after = sanitizeInitials(before);
    if(before !== after) input.value = after;
  }
  function update(){
    sanitizeField(first);
    sanitizeField(last);
    const id = computeStudentId(first.value||"", last.value||"");
    if(id){
      preview.innerHTML = `<div class="id-preview">🪪 Identifiant : ${id}</div>`;
    } else {
      preview.innerHTML = "";
    }
    startBtn.disabled = !(id && access.value.trim().length>0);
    idError.style.display = "none";
  }
  access.addEventListener("input", update);
  first.addEventListener("input", update);
  last.addEventListener("input", update);
  startBtn.addEventListener("click", () => {
    const id = computeStudentId(first.value||"", last.value||"");
    if(!id) return;
    if(access.value.trim().toUpperCase() !== STUDENT_ACCESS_CODE.toUpperCase()){
      idError.textContent = "Code d'accès incorrect. Demandez-le à votre professeur.";
      idError.style.display = "block";
      return;
    }
    state = {
      studentId: id,
      startedAt: new Date().toISOString(),
      currentLevel: 1,
      currentVariantIdx: 0,
      totalScore: 0,
      screen: "levelIntro",
      history: [] // array of {level, variantLabel, kind, correctCount, total, percentage, pointsFromCorrect, bonusMalus, advanced, items:[{q,studentAnswer,correctAnswer,isCorrect}], timestamp}
    };
    saveState();
    render();
  });
}

/* ---------- Level intro screen ---------- */
function renderLevelIntroScreen(){
  const level = LEVELS[state.currentLevel-1];
  const variant = level.variants[state.currentVariantIdx];
  return `
  <div class="card level-intro-card">
    <div class="level-icon-badge">${LEVEL_ICONS[level.num-1]}</div>
    <span class="eyebrow">Niveau ${level.num} / 7</span>
    <h2>${escapeHtml(level.title)}</h2>
    <div class="objectif-box"><strong>🎯 Objectif :</strong> ${escapeHtml(level.objectif)}</div>
    <div class="consigne-box"><strong>📋 Consigne :</strong> ${escapeHtml(level.consigne)}</div>
    <p class="muted">${escapeHtml(variant.label)} — ${variant.items.length} item${variant.items.length>1?'s':''}${level.kind==="reorder" ? " à remettre en ordre" : ""}</p>
    <div class="btn-row">
      <button class="btn btn-primary btn-lg" id="beginExerciseBtn">▶️ Commencer l'exercice</button>
    </div>
  </div>`;
}
function attachLevelIntroEvents(){
  document.getElementById("beginExerciseBtn").addEventListener("click", () => {
    startExerciseRunner();
  });
}

/* ---------- Exercise runner ---------- */
function startExerciseRunner(){
  const level = LEVELS[state.currentLevel-1];
  const variant = level.variants[state.currentVariantIdx];
  runner = {
    level, variant, kind: level.kind,
    currentIndex: 0,
    answers: [],
    shuffleCache: {}
  };
  if(level.kind === "reorder"){
    runner.reorderOrder = shuffle(variant.items.map((it,idx)=>({...it, origIndex:idx})));
  }
  state.screen = "exercise";
  saveState();
  render();
}

/* Mélange les options d'une question QCM (une seule fois par question, mémorisé),
   pour que la bonne réponse ne soit jamais systématiquement à la même position. */
function getShuffledOptions(item, cacheKey){
  if(!runner.shuffleCache) runner.shuffleCache = {};
  if(!runner.shuffleCache[cacheKey]){
    const order = shuffle(item.options.map((_,i)=>i));
    runner.shuffleCache[cacheKey] = {
      options: order.map(i=>item.options[i]),
      correctIdx: order.indexOf(item.correct)
    };
  }
  return runner.shuffleCache[cacheKey];
}

function renderExerciseScreen(){
  const level = LEVELS[state.currentLevel-1];
  const variant = level.variants[state.currentVariantIdx];

  if(level.kind === "reorder"){
    return renderReorderExercise(variant);
  }
  if(level.kind === "reading"){
    return renderReadingExercise(variant);
  }
  // qcm or tf
  const item = variant.items[runner.currentIndex];
  const total = variant.items.length;
  const optionsHtml = level.kind === "tf"
    ? renderTfOptions()
    : renderQcmOptions(getShuffledOptions(item, "q"+runner.currentIndex).options);
  return `
  <div class="card">
    <div class="q-progress">${variant.label} — Question ${runner.currentIndex+1} / ${total}</div>
    <div class="q-text">${escapeHtml(item.q)}</div>
    ${optionsHtml}
    <div class="btn-row">
      <button class="btn btn-primary" id="nextBtn" disabled>${runner.currentIndex+1 < total ? "Question suivante" : "Voir le résultat"}</button>
    </div>
  </div>`;
}
function renderQcmOptions(options){
  const letters = ["A","B","C","D"];
  return `<div class="options" id="optionsWrap">${options.map((o,i)=>`
    <button type="button" class="option" data-idx="${i}"><span class="letter">${letters[i]}</span><span>${escapeHtml(o)}</span></button>
  `).join("")}</div>`;
}
function renderTfOptions(){
  return `<div class="tf-row" id="optionsWrap">
    <button type="button" class="option" data-idx="1">✅ True</button>
    <button type="button" class="option" data-idx="0">❌ False</button>
  </div>`;
}
function attachExerciseEvents(){
  const level = LEVELS[state.currentLevel-1];
  if(level.kind === "reorder"){ attachReorderEvents(); return; }
  if(level.kind === "reading"){ attachReadingEvents(); return; }

  const wrap = document.getElementById("optionsWrap");
  const nextBtn = document.getElementById("nextBtn");
  let selected = null;
  wrap.querySelectorAll(".option").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      wrap.querySelectorAll(".option").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = parseInt(btn.dataset.idx,10);
      nextBtn.disabled = false;
    });
  });
  nextBtn.addEventListener("click", ()=>{
    if(selected===null) return;
    recordSimpleAnswer(level, selected);
    selected = null;
    advanceSimpleExercise(level);
  });
}
function recordSimpleAnswer(level, selectedIdx){
  const variant = level.variants[state.currentVariantIdx];
  const item = variant.items[runner.currentIndex];
  if(level.kind === "tf"){
    const studentBool = selectedIdx === 1;
    const isCorrect = studentBool === item.correct;
    runner.answers.push({
      q: item.q,
      studentAnswer: studentBool ? "True" : "False",
      correctAnswer: item.correct ? "True" : "False",
      isCorrect
    });
  } else {
    const shuf = getShuffledOptions(item, "q"+runner.currentIndex);
    const isCorrect = selectedIdx === shuf.correctIdx;
    runner.answers.push({
      q: item.q,
      studentAnswer: shuf.options[selectedIdx],
      correctAnswer: shuf.options[shuf.correctIdx],
      isCorrect
    });
  }
}
function advanceSimpleExercise(level){
  const variant = level.variants[state.currentVariantIdx];
  if(runner.currentIndex+1 < variant.items.length){
    runner.currentIndex++;
    render();
  } else {
    finalizeExercise();
  }
}

/* ---------- Reading exercise (level 5) ---------- */
function renderReadingExercise(variant){
  const item = variant.items[runner.currentIndex];
  const total = variant.items.length;
  const optionsHtml = item.type === "tf"
    ? renderTfOptions()
    : renderQcmOptions(getShuffledOptions(item, "r"+runner.currentIndex).options);
  return `
  <div class="card">
    <div class="reading-wrap">
      <div class="reading-text">
        <h4>Texte à lire</h4>
        <p>${escapeHtml(variant.text)}</p>
      </div>
      <div>
        <div class="q-progress">${variant.label} — Question ${runner.currentIndex+1} / ${total}</div>
        <div class="q-text">${escapeHtml(item.q)}</div>
        ${optionsHtml}
        <div class="btn-row">
          <button class="btn btn-primary" id="nextBtn" disabled>${runner.currentIndex+1 < total ? "Question suivante" : "Voir le résultat"}</button>
        </div>
      </div>
    </div>
  </div>`;
}
function attachReadingEvents(){
  const level = LEVELS[state.currentLevel-1];
  const variant = level.variants[state.currentVariantIdx];
  const item = variant.items[runner.currentIndex];
  const wrap = document.getElementById("optionsWrap");
  const nextBtn = document.getElementById("nextBtn");
  let selected = null;
  wrap.querySelectorAll(".option").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      wrap.querySelectorAll(".option").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = parseInt(btn.dataset.idx,10);
      nextBtn.disabled = false;
    });
  });
  nextBtn.addEventListener("click", ()=>{
    if(selected===null) return;
    if(item.type === "tf"){
      const studentBool = selected === 1;
      const isCorrect = studentBool === item.correct;
      runner.answers.push({ q:item.q, studentAnswer: studentBool?"True":"False", correctAnswer: item.correct?"True":"False", isCorrect });
    } else {
      const shuf = getShuffledOptions(item, "r"+runner.currentIndex);
      const isCorrect = selected === shuf.correctIdx;
      runner.answers.push({ q:item.q, studentAnswer:shuf.options[selected], correctAnswer:shuf.options[shuf.correctIdx], isCorrect });
    }
    selected = null;
    if(runner.currentIndex+1 < variant.items.length){
      runner.currentIndex++;
      render();
    } else {
      finalizeExercise();
    }
  });
}

/* ---------- Reorder exercise (level 6) ---------- */
function renderReorderExercise(variant){
  const total = runner.reorderOrder.length;
  const rows = runner.reorderOrder.map((it,idx)=>`
    <div class="reorder-item speaker-${it.s}" data-pos="${idx}">
      <span class="speaker">${it.s === "Salesperson" ? "Vendeur" : "Client"}</span>
      <span class="txt">${escapeHtml(it.t)}</span>
      <span class="moves">
        <button type="button" data-dir="up" data-pos="${idx}" ${idx===0?"disabled":""}>▲</button>
        <button type="button" data-dir="down" data-pos="${idx}" ${idx===total-1?"disabled":""}>▼</button>
      </span>
    </div>`).join("");
  return `
  <div class="card">
    <div class="q-progress">${variant.label} — ${total} répliques à remettre dans l'ordre chronologique</div>
    <div class="reorder-list" id="reorderList">${rows}</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="validateOrderBtn">Valider l'ordre</button>
    </div>
  </div>`;
}
function attachReorderEvents(){
  const list = document.getElementById("reorderList");
  list.addEventListener("click", (e)=>{
    const btn = e.target.closest("button[data-dir]");
    if(!btn) return;
    const pos = parseInt(btn.dataset.pos,10);
    const dir = btn.dataset.dir;
    const arr = runner.reorderOrder;
    if(dir==="up" && pos>0){
      [arr[pos-1],arr[pos]] = [arr[pos],arr[pos-1]];
    } else if(dir==="down" && pos<arr.length-1){
      [arr[pos+1],arr[pos]] = [arr[pos],arr[pos+1]];
    }
    render();
  });
  document.getElementById("validateOrderBtn").addEventListener("click", ()=>{
    const arr = runner.reorderOrder;
    let correctCount = 0;
    arr.forEach((it,idx)=>{
      const isCorrect = it.origIndex === idx;
      if(isCorrect) correctCount++;
    });
    // build a readable answer detail for the PDF
    runner.answers = [{
      q: "Ordre du dialogue (24 répliques)",
      studentAnswer: arr.map(it => (it.s==="Salesperson"?"Vendeur":"Client")+": "+it.t).join(" / "),
      correctAnswer: runner.variant.items.map(it => (it.s==="Salesperson"?"Vendeur":"Client")+": "+it.t).join(" / "),
      isCorrect: correctCount === arr.length,
      partialCorrectCount: correctCount,
      partialTotal: arr.length
    }];
    finalizeExercise(correctCount, arr.length);
  });
}

/* ---------- Finalize exercise: scoring + progression ---------- */
function finalizeExercise(overrideCorrect, overrideTotal){
  const level = LEVELS[state.currentLevel-1];
  const variant = level.variants[state.currentVariantIdx];
  let correctCount, total;
  if(typeof overrideCorrect === "number"){
    correctCount = overrideCorrect; total = overrideTotal;
  } else {
    correctCount = runner.answers.filter(a=>a.isCorrect).length;
    total = runner.answers.length;
  }
  const percentage = Math.round((correctCount/total)*1000)/10;
  const pointsFromCorrect = correctCount*2;

  let bonusMalus = 0, advanced = false, thresholdMsg = "";
  const vIdx = state.currentVariantIdx;
  if(vIdx === 0){
    if(percentage === 100){ bonusMalus = 50; advanced = true; thresholdMsg = "100% : niveau suivant débloqué !"; }
    else { bonusMalus = -20; advanced = false; thresholdMsg = "Moins de 100% : on retente une variante différente."; }
  } else if(vIdx === 1){
    if(percentage > 90){ bonusMalus = 20; advanced = true; thresholdMsg = "Plus de 90% : niveau suivant débloqué !"; }
    else { bonusMalus = -20; advanced = false; thresholdMsg = "90% ou moins : dernière variante à tenter."; }
  } else {
    if(percentage > 85){ bonusMalus = 10; advanced = true; thresholdMsg = "Plus de 85% : niveau suivant débloqué !"; }
    else { bonusMalus = -10; advanced = true; thresholdMsg = "85% ou moins, mais on passe au niveau suivant."; }
  }

  const totalPointsThisExercise = pointsFromCorrect + bonusMalus;
  state.totalScore += totalPointsThisExercise;

  state.history.push({
    level: level.num,
    levelTitle: level.title,
    variantLabel: variant.label,
    kind: level.kind,
    correctCount, total, percentage,
    pointsFromCorrect, bonusMalus, totalPointsThisExercise,
    advanced,
    items: runner.answers,
    timestamp: new Date().toISOString()
  });

  state.lastResult = {
    levelNum: level.num, levelTitle: level.title, variantLabel: variant.label,
    correctCount, total, percentage, pointsFromCorrect, bonusMalus, totalPointsThisExercise,
    advanced, thresholdMsg
  };

  if(advanced){
    if(level.num === 7){
      state.screen = "final";
    } else {
      state.currentLevel += 1;
      state.currentVariantIdx = 0;
      state.screen = "result";
    }
  } else {
    state.currentVariantIdx += 1;
    state.screen = "result";
  }
  runner = null;
  saveState();
  render();
}

}
function attachFinalEvents(){
  document.getElementById("finalPdfBtn").addEventListener("click", downloadPdf);
  launchConfetti();
}
function launchConfetti(){
  const wrap = document.getElementById("confettiWrap");
  if(!wrap) return;
  const colors = ["#FF6F4F","#F5B429","#0F5E56","#2E9E64","#E0512F"];
  for(let i=0;i<36;i++){
    const piece = document.createElement("span");
    piece.className = "confetti-piece";
    piece.style.left = (Math.random()*100)+"%";
    piece.style.background = colors[i % colors.length];
    piece.style.animationDelay = (Math.random()*0.6)+"s";
    piece.style.animationDuration = (2.2+Math.random()*1.4)+"s";
    piece.style.transform = `rotate(${Math.random()*360}deg)`;
    wrap.appendChild(piece);
  }
  setTimeout(()=>{ wrap.innerHTML = ""; }, 4200);
}

/* ---------- PDF generation ---------- */
function downloadPdf(){
  if(!state || !state.studentId){ alert("Identifiez-vous avant de télécharger un PDF."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"mm", format:"a4"});
  const pageW = 210, marginX = 16, maxW = pageW - marginX*2;
  let y = 20;

  function ensureSpace(needed){
    if(y + needed > 285){ doc.addPage(); y = 20; }
  }
  function heading(text, size){
    ensureSpace(10);
    doc.setFont("helvetica","bold"); doc.setFontSize(size||14);
    doc.text(text, marginX, y);
    y += size ? size*0.5+2 : 8;
    doc.setFont("helvetica","normal"); doc.setFontSize(10.5);
  }
  function paragraph(text){
    const lines = doc.splitTextToSize(text, maxW);
    lines.forEach(line=>{
      ensureSpace(6);
      doc.text(line, marginX, y);
      y += 5.2;
    });
  }

  // Page 1 — rules
  doc.setFont("helvetica","bold"); doc.setFontSize(18);
  doc.text("Sales English Challenge", marginX, y); y += 9;
  doc.setFontSize(11); doc.setFont("helvetica","normal");
  doc.text("Résultats de l'escape game — Anglais commercial (BTS NDRC 1re année)", marginX, y); y += 12;

  heading("Règles du jeu", 12);
  paragraph(GAME_RULES_TEXT.replace(/\n/g, "\n"));
  y += 3;
  heading("À faire maintenant", 12);
  paragraph("Téléchargez ce PDF (à la fin du jeu ou à tout moment de votre progression) et envoyez-le à votre professeur par message sur École Directe.");
  y += 4;

  ensureSpace(20);
  doc.setDrawColor(230,220,200); doc.line(marginX, y, pageW-marginX, y); y += 8;

  heading("Identifiant élève : " + state.studentId, 13);
  paragraph("Date d'export : " + fmtDate(new Date().toISOString()));
  paragraph("Score total actuel : " + state.totalScore + " points");
  y += 4;

  // Detailed history
  doc.addPage(); y = 20;
  heading("Détail du parcours", 15);

  if(!state.history || state.history.length === 0){
    paragraph("Aucun exercice n'a encore été terminé.");
  }

  (state.history||[]).forEach((h, idx)=>{
    ensureSpace(16);
    doc.setFillColor(244,236,220);
    doc.rect(marginX, y-5, maxW, 8, "F");
    doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text(`Niveau ${h.level} — ${h.variantLabel}`, marginX+2, y);
    y += 8;
    doc.setFont("helvetica","normal"); doc.setFontSize(10);
    paragraph(`Score : ${h.correctCount} / ${h.total} (${h.percentage}%) — Points réponses justes : +${h.pointsFromCorrect} — Bonus/malus de niveau : ${h.bonusMalus>=0?'+':''}${h.bonusMalus} — Total exercice : ${h.totalPointsThisExercise>=0?'+':''}${h.totalPointsThisExercise} pts`);
    y += 1;

    if(h.kind === "reorder"){
      const it = h.items[0];
      paragraph(`Résultat : ${it.partialCorrectCount} / ${it.partialTotal} répliques correctement placées.`);
    } else {
      h.items.forEach((it, i)=>{
        ensureSpace(14);
        doc.setFont("helvetica","bold"); doc.setFontSize(9.5);
        const qLines = doc.splitTextToSize(`${i+1}. ${it.q}`, maxW);
        qLines.forEach(l=>{ ensureSpace(5); doc.text(l, marginX, y); y+=4.6; });
        doc.setFont("helvetica","normal"); doc.setFontSize(9.5);
        const mark = it.isCorrect ? "✓ Correct" : "✗ Incorrect";
        doc.setTextColor(it.isCorrect ? 46 : 214, it.isCorrect ? 158 : 69, it.isCorrect ? 100 : 69);
        const ansLines = doc.splitTextToSize(`Réponse donnée : ${it.studentAnswer}  (${mark})`, maxW);
        ansLines.forEach(l=>{ ensureSpace(5); doc.text(l, marginX+2, y); y+=4.4; });
        doc.setTextColor(28,43,48);
        if(!it.isCorrect){
          const corrLines = doc.splitTextToSize(`Réponse correcte : ${it.correctAnswer}`, maxW);
          corrLines.forEach(l=>{ ensureSpace(5); doc.text(l, marginX+2, y); y+=4.4; });
        }
        y += 1.5;
      });
    }
    y += 3;
  });

  doc.save(`SalesEnglishChallenge_${state.studentId}.pdf`);
}
